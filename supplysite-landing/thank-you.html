<!DOCTYPE html>
<html lang="en">
<head>

  new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
  j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
  'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
  })(window,document,'script','dataLayer','GTM-597X6XNC');</script>

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Thank You | SiteSupply</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --color-brand-navy: #090e1a;
      --color-brand-orange: #ff6f00;
      --color-slate-50: #f8fafc;
      --color-slate-100: #f1f5f9;
      --color-slate-200: #e2e8f0;
      --color-slate-600: #475569;
      --color-slate-900: #0f172a;
      --color-slate-950: #020617;
      --color-success: #10b981;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--color-slate-50);
      color: var(--color-slate-900);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
    }

    /* Container Card styling */
    .thank-you-card {
      background-color: white;
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 20px;
      padding: 3rem 2rem;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 20px 40px rgba(9, 14, 26, 0.08);
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    /* Animated Checkmark */
    .success-icon-container {
      width: 80px;
      height: 80px;
      background-color: rgba(16, 185, 129, 0.1);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      color: var(--color-success);
      margin-bottom: 0.5rem;
      animation: pulse 2s infinite;
    }

    .success-icon {
      width: 40px;
      height: 40px;
    }

    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4);
      }
      70% {
        box-shadow: 0 0 0 15px rgba(16, 185, 129, 0);
      }
      100% {
        box-shadow: 0 0 0 0 rgba(16, 185, 129, 0);
      }
    }

    .headline {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      color: var(--color-slate-950);
      line-height: 1.25;
    }

    .message {
      font-size: 0.95rem;
      color: var(--color-slate-600);
      line-height: 1.6;
    }

    .redirect-status {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--color-brand-orange);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin: 0.5rem 0;
    }

    /* Simple CSS Spinner */
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 111, 0, 0.25);
      border-top-color: var(--color-brand-orange);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Premium CTA Button */
    .btn-wa-redirect {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      background-color: var(--color-success);
      color: white;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      padding: 0.875rem 1.5rem;
      border-radius: 12px;
      transition: all 0.2s ease;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
    }

    .btn-wa-redirect:hover {
      background-color: #059669;
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(16, 185, 129, 0.3);
    }

    .logo-container {
      margin-top: 1rem;
    }
    
    .logo-container img {
      height: 1.5rem;
      width: auto;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <!-- Google Tag Manager (noscript) -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-597X6XNC"
  height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
  <!-- End Google Tag Manager (noscript) -->

  <div class="thank-you-card">
    <div class="success-icon-container">
      <svg class="success-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    </div>
    
    <h1 class="headline">Thank You<span id="client-name-span"></span>!</h1>
    
    <p class="message">
      We have received your callback request. To get today's latest wholesale price list immediately, we are connecting you directly with our sales desk.
    </p>
    
    <div class="redirect-status">
      <div class="spinner"></div>
      <span>Redirecting you to WhatsApp in 2 seconds...</span>
    </div>
    
    <a href="#" id="fallback-btn" class="btn-wa-redirect">
      CONTINUE TO WHATSAPP NOW
    </a>
    
    <div class="logo-container">
      <img src="https://sitesupply.co.in/public/assets/front-end/img/logo.png" alt="SiteSupply Logo">
    </div>
  </div>

  <script>
    // Parse query parameters to greet user by name and setup redirect URL
    const params = new URLSearchParams(window.location.search);
    const rawName = params.get('name');
    const redirectUrl = params.get('redirect');

    if (rawName) {
      const cleanName = decodeURIComponent(rawName).trim();
      if (cleanName) {
        document.getElementById('client-name-span').textContent = `, ${cleanName}`;
      }
    }

    const defaultWaUrl = "https://api.whatsapp.com/send/?phone=917348481111&text=Hi%20SiteSupply%2C%20I%20am%20looking%20for%20wholesale%20rates%20for%20cement%20and%20TMT%20saria.&type=phone_number&app_absent=0";
    const targetUrl = redirectUrl ? decodeURIComponent(redirectUrl) : defaultWaUrl;

    // Set fallback button href
    const fallbackBtn = document.getElementById('fallback-btn');
    if (fallbackBtn) {
      fallbackBtn.setAttribute('href', targetUrl);
    }

    // Perform automatic redirection after 2 seconds (2000ms)
    setTimeout(() => {
      window.location.href = targetUrl;
    }, 2000);
  </script>
</body>
</html>
